
<!DOCTYPE html>
<html>
<head>
    <title>Travel Plan Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            color: #333;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }
        h1 {
            text-align: center;
            color: #0056b3;
            margin-bottom: 30px;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="number"] {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 16px;
        }
        input[type="submit"] {
            background-color: #0056b3;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            transition: background-color 0.3s;
        }
        input[type="submit"]:hover {
            background-color: #004494;
        }
        #plan-container {
            display: none;
        }
        .plan-details p {
            font-size: 18px;
            margin: 10px 0;
        }
        .plan-details strong {
            color: #0056b3;
        }
        .itinerary {
            margin-top: 30px;
        }
        .itinerary h2 {
            color: #0056b3;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .day {
            background: #e7f3ff;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .day h3 {
            color: #004494;
            margin-top: 0;
        }
        .new-plan-btn {
            display: block;
            width: 200px;
            margin: 40px auto 0;
            padding: 15px;
            text-align: center;
            background-color: #0056b3;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
            cursor: pointer;
        }
        .new-plan-btn:hover {
            background-color: #004494;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="form-container">
            <h1>Travel Plan Generator</h1>
            <form id="travel-plan-form">
                <label for="destination">Destination:</label>
                <input type="text" id="destination" name="destination" placeholder="e.g., Paris, New York" required>
                <label for="days">Number of days:</label>
                <input type="number" id="days" name="days" min="1" placeholder="e.g., 2" required>
                <label for="travelers">Number of travelers:</label>
                <input type="number" id="travelers" name="travelers" min="1" placeholder="e.g., 2" required>
                <label for="budget">Budget (USD):</label>
                <input type="number" id="budget" name="budget" min="1" placeholder="e.g., 1500" required>
                <input type="submit" value="Generate My Travel Plan">
            </form>
        </div>

        <div id="plan-container">
            <!-- The generated plan will be injected here -->
        </div>
    </div>

    <script>
        document.getElementById('travel-plan-form').addEventListener('submit', async function(event) {
            event.preventDefault();

            const destination = document.getElementById('destination').value;
            const days = parseInt(document.getElementById('days').value);
            const travelers = document.getElementById('travelers').value;
            const budget = document.getElementById('budget').value;

            let itineraryHtml = '';
            for (let i = 1; i <= days; i++) {
                const suggestions = await getSuggestions(destination, i);
                let placesHtml = '';
                if (suggestions.places_of_interest && suggestions.places_of_interest.length > 0) {
                    placesHtml = '<h4>Places of Interest</h4><ul>';
                    suggestions.places_of_interest.forEach(place => {
                        placesHtml += `<li><strong>${place.name}:</strong> ${place.description}</li>`;
                    });
                    placesHtml += '</ul>';
                }

                let diningHtml = '';
                if (suggestions.dining_options && suggestions.dining_options.length > 0) {
                    diningHtml = '<h4>Dining Options</h4><ul>';
                    suggestions.dining_options.forEach(option => {
                        diningHtml += `<li><strong>${option.name}:</strong> ${option.description}</li>`;
                    });
                    diningHtml += '</ul>';
                }

                itineraryHtml += `
                    <div class="day">
                        <h3>Day ${i}</h3>
                        ${placesHtml || '<p>No suggestions for places of interest on this day.</p>'}
                        ${diningHtml || '<p>No suggestions for dining options on this day.</p>'}
                    </div>
                `;
            }

            const planHtml = `
                <h1>Your Custom Travel Plan</h1>
                <div class="plan-details">
                    <p><strong>Destination:</strong> ${destination}</p>
                    <p><strong>Duration:</strong> ${days} Days</p>
                    <p><strong>Travelers:</strong> ${travelers}</p>
                    <p><strong>Total Budget:</strong> $${budget}</p>
                </div>

                <div class="itinerary">
                    <h2>Daily Itinerary</h2>
                    ${itineraryHtml}
                </div>

                <div class="new-plan-btn" onclick="startNewPlan()">Create a New Plan</div>
            `;

            document.getElementById('form-container').style.display = 'none';
            const planContainer = document.getElementById('plan-container');
            planContainer.innerHTML = planHtml;
            planContainer.style.display = 'block';
        });

        async function getSuggestions(destination, day) {
            // In a real application, you would make an API call here.
            // For this example, we'll use dummy data.
            const dummyData = {
                "Paris": {
                    "1": {
                        "places_of_interest": [
                            { "name": "Eiffel Tower", "description": "Iconic landmark of Paris." },
                            { "name": "Louvre Museum", "description": "Home to the Mona Lisa." }
                        ],
                        "dining_options": [
                            { "name": "Le Jules Verne", "description": "Fine dining on the Eiffel Tower." },
                            { "name": "L'Ambroisie", "description": "Three Michelin-starred restaurant." }
                        ]
                    },
                    "2": {
                        "places_of_interest": [
                            { "name": "Notre-Dame Cathedral", "description": "Famous gothic cathedral." },
                            { "name": "Sainte-Chapelle", "description": "Stunning stained glass windows." }
                        ],
                        "dining_options": [
                            { "name": "Le Procope", "description": "One of the oldest restaurants in Paris." },
                            { "name": "Breizh Café", "description": "Famous for its crêpes." }
                        ]
                    }
                },
                "New York": {
                    "1": {
                        "places_of_interest": [
                            { "name": "Statue of Liberty", "description": "A symbol of freedom." },
                            { "name": "Empire State Building", "description": "Iconic skyscraper with city views." }
                        ],
                        "dining_options": [
                            { "name": "Katz's Delicatessen", "description": "Classic New York deli." },
                            { "name": "Grimaldi's Pizza", "description": "Famous pizza under the Brooklyn Bridge." }
                        ]
                    }
                }
            };

            return new Promise(resolve => {
                setTimeout(() => {
                    resolve((dummyData[destination] && dummyData[destination][day]) || { "places_of_interest": [], "dining_options": [] });
                }, 500);
            });
        }

        function startNewPlan() {
            document.getElementById('plan-container').style.display = 'none';
            document.getElementById('travel-plan-form').reset();
            document.getElementById('form-container').style.display = 'block';
        }
    </script>
</body>
</html>
