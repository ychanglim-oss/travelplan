
<!DOCTYPE html>
<html>
<head>
    <title>Travel Plan Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-coral: #FF7F50;
            --secondary-teal: #20B2AA;
            --sunny-yellow: #FFD700;
            --soft-white: #FFFFFF;
            --dark-text: #2D3436;
            --light-bg: #f8f9fa;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--sunny-yellow) 0%, var(--primary-coral) 100%);
            color: var(--dark-text);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--soft-white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 850px;
            transition: transform 0.3s ease;
        }

        h1 {
            text-align: center;
            color: var(--primary-coral);
            margin-bottom: 30px;
            font-weight: 600;
            font-size: 2.2rem;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-weight: 400;
            color: #636e72;
        }

        input[type="text"],
        input[type="number"] {
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-coral);
        }

        input[type="submit"] {
            background-color: var(--primary-coral);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 127, 80, 0.3);
        }

        input[type="submit"]:hover {
            background-color: #ff6a33;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 127, 80, 0.4);
        }

        #plan-container {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .plan-details {
            background: var(--light-bg);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .plan-details p {
            font-size: 15px;
            margin: 0;
            color: #636e72;
        }

        .plan-details strong {
            display: block;
            color: var(--primary-coral);
            font-size: 18px;
        }

        .itinerary h2 {
            color: var(--secondary-teal);
            font-size: 1.8rem;
            margin-bottom: 25px;
            text-align: center;
        }

        .day {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            border-left: 5px solid var(--secondary-teal);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.2s ease;
        }

        .day:hover {
            transform: scale(1.02);
        }

        .day h3 {
            color: var(--secondary-teal);
            margin-top: 0;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .day h4 {
            color: var(--primary-coral);
            margin: 15px 0 8px;
            font-size: 1.1rem;
        }

        .day ul {
            padding-left: 20px;
            margin: 0;
        }

        .day li {
            margin-bottom: 8px;
        }

        .new-plan-btn {
            display: block;
            width: fit-content;
            margin: 40px auto 0;
            padding: 15px 40px;
            text-align: center;
            background-color: var(--secondary-teal);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .new-plan-btn:hover {
            background-color: #1a9e97;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="form-container">
            <h1>🏝️ Travel Plan Generator ✈️</h1>
            <form id="travel-plan-form">
                <label for="destination">📍 Destination:</label>
                <input type="text" id="destination" name="destination" placeholder="e.g., Paris, Tokyo" required>
                
                <label for="days">📅 Number of days:</label>
                <input type="number" id="days" name="days" min="1" placeholder="e.g., 3" required>
                
                <label for="travelers">👥 Number of travelers:</label>
                <input type="number" id="travelers" name="travelers" min="1" placeholder="e.g., 2" required>
                
                <label for="budget">💰 Budget (USD):</label>
                <input type="number" id="budget" name="budget" min="1" placeholder="e.g., 2000" required>
                
                <input type="submit" value="☀️ Generate My Vacation!">
            </form>
        </div>

        <div id="plan-container">
            <!-- The generated plan will be injected here -->
        </div>
    </div>

    <script>
        document.getElementById('travel-plan-form').addEventListener('submit', async function(event) {
            event.preventDefault();

            const destination = document.getElementById('destination').value;
            const days = parseInt(document.getElementById('days').value);
            const travelers = document.getElementById('travelers').value;
            const budget = document.getElementById('budget').value;

            let itineraryHtml = '';
            for (let i = 1; i <= days; i++) {
                const suggestions = await getSuggestions(destination, i);
                let placesHtml = '';
                if (suggestions.places_of_interest && suggestions.places_of_interest.length > 0) {
                    placesHtml = '<h4>🏛️ Places of Interest</h4><ul>';
                    suggestions.places_of_interest.forEach(place => {
                        placesHtml += `<li><strong>${place.name}:</strong> ${place.description}</li>`;
                    });
                    placesHtml += '</ul>';
                }

                let diningHtml = '';
                if (suggestions.dining_options && suggestions.dining_options.length > 0) {
                    diningHtml = '<h4>🍽️ Dining Options</h4><ul>';
                    suggestions.dining_options.forEach(option => {
                        diningHtml += `<li><strong>${option.name}:</strong> ${option.description}</li>`;
                    });
                    diningHtml += '</ul>';
                }

                itineraryHtml += `
                    <div class="day">
                        <h3>Day ${i}</h3>
                        ${placesHtml || '<p>No suggestions for places of interest on this day.</p>'}
                        ${diningHtml || '<p>No suggestions for dining options on this day.</p>'}
                    </div>
                `;
            }

            const planHtml = `
                <h1>🏝️ Your Custom Vacation Plan ☀️</h1>
                <div class="plan-details">
                    <p><strong>📍 Destination</strong> ${destination}</p>
                    <p><strong>📅 Duration</strong> ${days} Days</p>
                    <p><strong>👥 Travelers</strong> ${travelers}</p>
                    <p><strong>💰 Total Budget</strong> $${budget}</p>
                </div>

                <div class="itinerary">
                    <h2>🗺️ Daily Itinerary</h2>
                    ${itineraryHtml}
                </div>

                <div class="new-plan-btn" onclick="startNewPlan()">🔄 Plan Another Trip</div>
            `;

            document.getElementById('form-container').style.display = 'none';
            const planContainer = document.getElementById('plan-container');
            planContainer.innerHTML = planHtml;
            planContainer.style.display = 'block';
        });

        async function getSuggestions(destination, day) {
            // In a real application, you would make an API call here.
            // For this example, we'll use expanded dummy data.
            const dummyData = {
                "Paris": {
                    "1": {
                        "places_of_interest": [
                            { "name": "Eiffel Tower", "description": "Iconic landmark of Paris." },
                            { "name": "Louvre Museum", "description": "Home to the Mona Lisa and vast art collections." }
                        ],
                        "dining_options": [
                            { "name": "Le Jules Verne", "description": "Fine dining on the Eiffel Tower." },
                            { "name": "Angelina", "description": "Famous for its world-class hot chocolate." }
                        ]
                    },
                    "2": {
                        "places_of_interest": [
                            { "name": "Notre-Dame Cathedral", "description": "Famous gothic cathedral (exterior views)." },
                            { "name": "Sainte-Chapelle", "description": "Stunning stained glass windows." }
                        ],
                        "dining_options": [
                            { "name": "Le Procope", "description": "The oldest cafe in Paris." },
                            { "name": "Breizh Café", "description": "Excellent savory and sweet crêpes." }
                        ]
                    },
                    "3": {
                        "places_of_interest": [
                            { "name": "Montmartre & Sacré-Cœur", "description": "Artistic district with panoramic views." },
                            { "name": "Musée d'Orsay", "description": "Impressionist masterpieces in a former train station." }
                        ],
                        "dining_options": [
                            { "name": "Le Consulat", "description": "Classic cafe in the heart of Montmartre." },
                            { "name": "Bouillon Chartier", "description": "Traditional French food in a historic setting." }
                        ]
                    }
                },
                "New York": {
                    "1": {
                        "places_of_interest": [
                            { "name": "Statue of Liberty & Ellis Island", "description": "Symbols of American history." },
                            { "name": "Battery Park", "description": "Beautiful waterfront park with harbor views." }
                        ],
                        "dining_options": [
                            { "name": "Katz's Delicatessen", "description": "Legendary New York deli." },
                            { "name": "Fraunces Tavern", "description": "Historic colonial-era restaurant." }
                        ]
                    },
                    "2": {
                        "places_of_interest": [
                            { "name": "Empire State Building", "description": "Iconic Art Deco skyscraper." },
                            { "name": "Times Square", "description": "The bright lights and energy of NYC." }
                        ],
                        "dining_options": [
                            { "name": "Junior's Restaurant", "description": "Famous for the best cheesecake in NY." },
                            { "name": "Joe's Pizza", "description": "Classic Greenwich Village slice." }
                        ]
                    },
                    "3": {
                        "places_of_interest": [
                            { "name": "Central Park", "description": "Oasis in the middle of Manhattan." },
                            { "name": "Metropolitan Museum of Art", "description": "One of the world's largest art museums." }
                        ],
                        "dining_options": [
                            { "name": "Tavern on the Green", "description": "Iconic restaurant inside Central Park." },
                            { "name": "The Halal Guys", "description": "Famous street food cart." }
                        ]
                    }
                },
                "Tokyo": {
                    "1": {
                        "places_of_interest": [
                            { "name": "Senso-ji Temple", "description": "Tokyo's oldest temple in Asakusa." },
                            { "name": "Tokyo Skytree", "description": "Tallest tower in Japan with observation decks." }
                        ],
                        "dining_options": [
                            { "name": "Asakusa Imahan", "description": "Renowned for its sukiyaki and shabu-shabu." },
                            { "name": "Kamatake Udon", "description": "Delicious handmade udon noodles." }
                        ]
                    },
                    "2": {
                        "places_of_interest": [
                            { "name": "Meiji Jingu Shrine", "description": "Shinto shrine dedicated to Emperor Meiji." },
                            { "name": "Harajuku (Takeshita Street)", "description": "Center of youth culture and fashion." }
                        ],
                        "dining_options": [
                            { "name": "Afuri Ramen", "description": "Famous for its yuzu-scented ramen." },
                            { "name": "Maisen Tonkatsu", "description": "Top-tier breaded pork cutlets." }
                        ]
                    }
                }
            };

            const genericSuggestions = [
                {
                    "places_of_interest": [
                        { "name": "City Walking Tour", "description": "Explore the local streets and architecture." },
                        { "name": "Local Market", "description": "Experience local life and fresh produce." }
                    ],
                    "dining_options": [
                        { "name": "Highly Rated Local Bistro", "description": "Try the regional specialties." },
                        { "name": "Street Food Hub", "description": "Quick and delicious local bites." }
                    ]
                },
                {
                    "places_of_interest": [
                        { "name": "National Museum", "description": "Learn about the history and culture of the region." },
                        { "name": "Botanical Garden", "description": "Enjoy a peaceful stroll among native plants." }
                    ],
                    "dining_options": [
                        { "name": "Riverside Cafe", "description": "Relaxing meal with a view." },
                        { "name": "Family-Owned Trattoria", "description": "Authentic flavors and warm hospitality." }
                    ]
                }
            ];

            return new Promise(resolve => {
                setTimeout(() => {
                    let result = (dummyData[destination] && dummyData[destination][day]);
                    
                    if (!result) {
                        // Cycle through generic suggestions if specific ones aren't found
                        result = genericSuggestions[(day - 1) % genericSuggestions.length];
                    }
                    
                    resolve(result);
                }, 400);
            });
        }

        function startNewPlan() {
            document.getElementById('plan-container').style.display = 'none';
            document.getElementById('travel-plan-form').reset();
            document.getElementById('form-container').style.display = 'block';
        }
    </script>
</body>
</html>
